<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Monte Sinai entrega água mineral, gás de cozinha e produtos de limpeza com pedido rápido pelo celular e atendimento pelo WhatsApp.">
  <meta name="theme-color" content="#00061f">
  <meta name="color-scheme" content="dark light">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Monte Sinai">
  <meta property="og:title" content="Entrar | Monte Sinai">
  <meta property="og:description" content="Entre ou cadastre-se para salvar seus dados e comprar mais rápido.">
  <meta property="og:image" content="https://monte-sinai.netlify.app/assets/hero/hero-banner.png">
  <title>Entrar | Monte Sinai</title>
  <link rel="manifest" href="../site.webmanifest">
  <link rel="icon" type="image/png" href="../assets/brand/monte-sinai-logo-3d.png">
  <link rel="apple-touch-icon" href="../assets/brand/monte-sinai-logo-3d.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="https://nnglqufeyergsgzafdek.supabase.co">
  <link rel="stylesheet" href="../css/style.css?v=20260520-43">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js?v=20260520-3"></script>
  <script defer src="../js/script.js?v=20260520-36"></script>
</head>
<body class="auth-body">
  <main class="auth-page auth-center-page">
    <section class="auth-shell login-shell">
      <div class="auth-brand">
        <div class="brand-stack">
          <img class="brand-logo" src="../assets/brand/monte-sinai-logo-3d.png" alt="Monte Sinai" loading="eager" decoding="async" fetchpriority="high">
          <div>
            <span class="eyebrow">Bem-vindo à Monte Sinai</span>
            <h1>Login rápido para comprar água, gás e limpeza.</h1>
            <p>Você pode continuar navegando normalmente. A conta serve apenas para salvar dados e pedidos.</p>
          </div>
        </div>
      </div>

      <section class="auth-card login-card" aria-labelledby="account-title">
        <div class="section-head">
          <span class="eyebrow">Acesso ao cliente</span>
          <h2 id="account-title">Entrar ou cadastrar</h2>
          <p id="account-status">Entre ou crie sua conta para salvar endereço, telefone e agilizar seus pedidos.</p>
        </div>

        <div class="auth-mode-tabs" role="tablist" aria-label="Modo de acesso">
          <button class="auth-mode-tab active" type="button" data-auth-mode="login">Entrar</button>
          <button class="auth-mode-tab" type="button" data-auth-mode="register">Cadastrar</button>
          <button class="auth-mode-tab" type="button" data-auth-mode="reset-request">Recuperar senha</button>
        </div>

        <form class="checkout-form account-form" id="account-form" data-auth-mode="login" novalidate>
          <div class="form-group" data-register-only>
            <label for="login-name">Nome completo</label>
            <input id="login-name" type="text" autocomplete="name" placeholder="Seu nome completo">
          </div>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" autocomplete="email" placeholder="voce@email.com">
          </div>
          <div class="form-group" data-password-group>
            <label for="login-password">Senha</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="Sua senha">
          </div>
          <div class="form-group" data-confirm-password-group>
            <label for="login-password-confirm">Confirmar senha</label>
            <input id="login-password-confirm" type="password" autocomplete="new-password" placeholder="Repita a senha">
          </div>
          <div class="form-group" data-register-only>
            <label for="login-phone">WhatsApp</label>
            <input id="login-phone" type="tel" autocomplete="tel" placeholder="(11) 99999-9999">
          </div>
          <div class="form-group" data-register-only>
            <label for="login-address">Endereço principal</label>
            <input id="login-address" type="text" autocomplete="street-address" placeholder="Rua, número, bairro e cidade">
          </div>
          <div class="auth-actions">
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-user-check"></i>
              <span data-auth-submit-label>Entrar</span>
            </button>
          </div>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
