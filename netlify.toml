[[redirects]]
  from = "/pagamento.html"
  to = "/pages/pagamento.html"
  status = 200

[[redirects]]
  from = "/configuracoes"
  to = "/pages/configuracoes.html"
  status = 200

[[redirects]]
  from = "/configuracoes.html"
  to = "/pages/configuracoes.html"
  status = 200

[[redirects]]
