  to = "/pages/sobre.html"
  status = 200

[[redirects]]
  from = "/contato"
  to = "/pages/contato.html"
  status = 200

[[redirects]]
  from = "/contato.html"
  to = "/pages/contato.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/login.html"
  to = "/pages/login.html"
